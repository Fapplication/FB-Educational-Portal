<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ambo University — Engineering Web Portal</title>
  <link rel="stylesheet" href="css/main.css" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet" />
</head>
<body class="auth-page">

  <div class="auth-split">
    <div class="auth-brand">
      <div>
        <img src="logo.png" alt="AU" style="height:100px; margin-bottom:1rem;" onerror="this.style.display='none';" />
        <h2>Ambo University</h2>
        <p class="brand-dept">Faculty of Engineering & Technology</p>
        <div class="brand-divider"></div>
        <p style="opacity:0.85;">Civil Engineering Department Matrix Core</p>
      </div>
    </div>

    <div class="auth-form-area">
      <div class="auth-card">
        <div class="auth-tabs">
          <button class="tab-btn active" onclick="switchTab('login')">Sign In</button>
          <button class="tab-btn" onclick="switchTab('register')">Register</button>
        </div>

        <div id="tab-login" class="tab-content active">
          <div id="login-error" class="alert alert-error" style="display:none;"></div>
          <div class="form-group">
            <label>User Identifier / Student ID</label>
            <input type="text" id="login-id" placeholder="e.g. ETS/123/15 or admin" />
          </div>
          <div class="form-group">
            <label>Security Password</label>
            <input type="password" id="login-pwd" placeholder="••••••••" />
          </div>
          <button class="btn-primary" onclick="doLogin()"><span id="login-btn-text">Sign In Engine</span></button>
        </div>

        <div id="tab-register" class="tab-content">
          <div id="reg-error" class="alert alert-error" style="display:none;"></div>
          <div id="reg-success" class="alert alert-success" style="display:none;"></div>
          <div class="form-group">
            <label>Pre-Authorized Student ID</label>
            <input type="text" id="reg-id" placeholder="e.g. ETS/123/15" />
          </div>
          <div class="form-group">
            <label>Full Legal Registration Name</label>
            <input type="text" id="reg-name" placeholder="As written on legal records" />
          </div>
          <div class="form-group">
            <label>Choose Framework Password</label>
            <input type="password" id="reg-pwd" placeholder="Minimum 6 characters" />
          </div>
          <button class="btn-primary" onclick="doRegister()">Verify and Register</button>
        </div>
      </div>
    </div>
  </div>

  <script src="js/config.js"></script>
  <script src="js/auth.js"></script>
</body>
</html>
